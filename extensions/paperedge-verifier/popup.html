<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 280px;
      padding: 12px;
      margin: 0;
      font-size: 13px;
      color: #111827;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 10px 0;
      color: #1e40af;
    }
    .status {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .ok { background: #ecfdf5; color: #065f46; }
    .warn { background: #fef3c7; color: #92400e; }
    .err { background: #fef2f2; color: #991b1b; }
    a {
      color: #1e40af;
      font-size: 12px;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 10px;
      border-top: 1px solid #e5e7eb;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <h2>PaperEdge Verifier</h2>
  <div id="status" class="status warn">Checking…</div>
  <div class="footer">
    <a href="http://localhost:3000" target="_blank">Open PaperEdge ▸</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
